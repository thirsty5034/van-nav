name: Build Check
on:
  push:
    branches:
      - 'feature/great-search'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build Frontend
        run: |
          npm install -g pnpm
          mkdir -p public
          cd ui && pnpm install && CI=false pnpm build && cd ..
          cp -r ui/build/* public/ 2>/dev/null || true

      - name: Build Backend
        run: |
          go mod tidy
          go build -v -o van-nav .

      - name: Verify
        run: |
          ls -lh van-nav
          echo "Build completed successfully!"
